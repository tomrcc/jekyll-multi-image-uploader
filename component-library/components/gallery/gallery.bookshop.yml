# Metadata about this component, to be used in the CMS
spec:
  structures:
    - content_blocks
  label: Gallery
  description: A grid of images with a multi-image uploader in the Visual Editor
  icon: photo_library
  tags:
    - Content

# Defines the structure of this component, as well as the default values
blueprint:
  images:
    - image: ""
      image_alt: ""

# Overrides any fields in the blueprint when viewing this component in the component browser
preview:
  images:
    - image: /images/image-example-1.jpg
      image_alt: Example image one
    - image: /images/image-example-2.jpg
      image_alt: Example image two

# Any extra CloudCannon inputs configuration to apply to the blueprint
_inputs:
  images:
    type: array
    comment: Add images one-by-one, or use the "＋ Add images" button on the page to upload several at once.
    options:
      structures:
        values:
          - label: Image
            icon: image
            preview:
              text:
                - key: image_alt
                - Image
              image:
                - key: image
            value:
              image: ""
              image_alt: ""
  image:
    type: image
  image_alt:
    type: text
    comment: Describe the image for accessibility and SEO.
